name: Dev Image Pipeline
description: Run devimg check or optimize in GitHub Actions
author: cleissonom
branding:
  icon: image
  color: blue

inputs:
  config:
    description: Path to devimg.toml
    required: false
    default: devimg.toml
  mode:
    description: "Command to run: check or optimize"
    required: false
    default: check
  working-directory:
    description: Directory to run devimg from
    required: false
    default: .
  fail-on-warning:
    description: Treat warnings, including quality diagnostics, as CI failures for check mode
    required: false
    default: "false"
  binary-path:
    description: Optional path to a preinstalled devimg binary
    required: false
  version:
    description: Release version to download when no binary is available
    required: false
    default: v0.2.3
  report-path:
    description: Markdown report path to append to the job summary
    required: false
    default: devimg-report.md
  manifest-path:
    description: Expected manifest path
    required: false
    default: public/images/devimg-manifest.json
  export-output:
    description: Optional checked-in manifest export/helper path to verify in check mode
    required: false
  export-manifest:
    description: Optional manifest path to export; defaults to manifest-path when omitted
    required: false
  export-format:
    description: "Manifest export format: json or typescript"
    required: false
    default: json
  export-typescript-helpers:
    description: Add TypeScript lookup helpers when verifying a TypeScript manifest export
    required: false
    default: "false"
  strip-prefix:
    description: Optional project path prefix to strip from exported image URLs
    required: false
  url-prefix:
    description: Optional URL prefix to add to exported image URLs
    required: false
  review-output:
    description: Optional static HTML review artifact path to create after a successful run
    required: false
  review-manifest:
    description: Optional manifest path to render for the review artifact; defaults to manifest-path
    required: false
  review-force:
    description: Replace an existing review artifact when review-output is set
    required: false
    default: "false"

outputs:
  status:
    description: pass or fail
    value: ${{ steps.run.outputs.status }}
  report-path:
    description: Markdown report path
    value: ${{ steps.run.outputs.report-path }}
  manifest-path:
    description: Manifest path
    value: ${{ steps.run.outputs.manifest-path }}
  review-output:
    description: Static HTML review artifact path when generated
    value: ${{ steps.run.outputs.review-output }}
  binary-path:
    description: Resolved devimg binary path
    value: ${{ steps.resolve.outputs.bin }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        DEVIMG_BINARY_PATH: ${{ inputs.binary-path }}
        DEVIMG_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        reject_multiline() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "$name cannot contain newlines" >&2
            exit 2
          fi
        }
        reject_multiline "binary-path" "$DEVIMG_BINARY_PATH"
        reject_multiline "version" "$DEVIMG_VERSION"
        if [[ -n "$DEVIMG_BINARY_PATH" ]]; then
          echo "bin=$DEVIMG_BINARY_PATH" >> "$GITHUB_OUTPUT"
        elif command -v devimg >/dev/null 2>&1; then
          echo "bin=$(command -v devimg)" >> "$GITHUB_OUTPUT"
        else
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          case "$os" in
            linux*) os="linux"; bin_name="devimg" ;;
            darwin*) os="darwin"; bin_name="devimg" ;;
            mingw*|msys*|cygwin*) os="windows"; bin_name="devimg.exe" ;;
            *) echo "Unsupported operating system: $os" >&2; exit 1 ;;
          esac
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) arch="x86_64" ;;
            arm64|aarch64) arch="aarch64" ;;
            *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
          esac
          asset="devimg-${os}-${arch}.tar.gz"
          url="https://github.com/cleissonom/devimg/releases/download/${DEVIMG_VERSION}/${asset}"
          checksum_url="$url.sha256"
          mkdir -p "$RUNNER_TEMP/devimg"
          curl -fsSL "$url" -o "$RUNNER_TEMP/devimg/$asset"
          curl -fsSL "$checksum_url" -o "$RUNNER_TEMP/devimg/$asset.sha256"
          (
            cd "$RUNNER_TEMP/devimg"
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum -c "$asset.sha256"
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 -c "$asset.sha256"
            else
              echo "sha256sum or shasum is required to verify devimg release downloads" >&2
              exit 1
            fi
          )
          tar -xzf "$RUNNER_TEMP/devimg/$asset" -C "$RUNNER_TEMP/devimg"
          chmod +x "$RUNNER_TEMP/devimg/$bin_name"
          echo "bin=$RUNNER_TEMP/devimg/$bin_name" >> "$GITHUB_OUTPUT"
        fi
    - id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        DEVIMG_BIN: ${{ steps.resolve.outputs.bin }}
        DEVIMG_MODE: ${{ inputs.mode }}
        DEVIMG_CONFIG: ${{ inputs.config }}
        DEVIMG_FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        DEVIMG_REPORT_PATH: ${{ inputs.report-path }}
        DEVIMG_MANIFEST_PATH: ${{ inputs.manifest-path }}
        DEVIMG_EXPORT_OUTPUT: ${{ inputs.export-output }}
        DEVIMG_EXPORT_MANIFEST: ${{ inputs.export-manifest }}
        DEVIMG_EXPORT_FORMAT: ${{ inputs.export-format }}
        DEVIMG_EXPORT_TYPESCRIPT_HELPERS: ${{ inputs.export-typescript-helpers }}
        DEVIMG_STRIP_PREFIX: ${{ inputs.strip-prefix }}
        DEVIMG_URL_PREFIX: ${{ inputs.url-prefix }}
        DEVIMG_REVIEW_OUTPUT: ${{ inputs.review-output }}
        DEVIMG_REVIEW_MANIFEST: ${{ inputs.review-manifest }}
        DEVIMG_REVIEW_FORCE: ${{ inputs.review-force }}
      run: |
        set +e
        reject_multiline() {
          local name="$1"
          local value="$2"
          if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
            echo "$name cannot contain newlines" >&2
            exit 2
          fi
        }
        reject_multiline "resolved binary path" "$DEVIMG_BIN"
        reject_multiline "mode" "$DEVIMG_MODE"
        reject_multiline "config" "$DEVIMG_CONFIG"
        reject_multiline "report-path" "$DEVIMG_REPORT_PATH"
        reject_multiline "manifest-path" "$DEVIMG_MANIFEST_PATH"
        reject_multiline "export-output" "$DEVIMG_EXPORT_OUTPUT"
        reject_multiline "export-manifest" "$DEVIMG_EXPORT_MANIFEST"
        reject_multiline "export-format" "$DEVIMG_EXPORT_FORMAT"
        reject_multiline "export-typescript-helpers" "$DEVIMG_EXPORT_TYPESCRIPT_HELPERS"
        reject_multiline "strip-prefix" "$DEVIMG_STRIP_PREFIX"
        reject_multiline "url-prefix" "$DEVIMG_URL_PREFIX"
        reject_multiline "review-output" "$DEVIMG_REVIEW_OUTPUT"
        reject_multiline "review-manifest" "$DEVIMG_REVIEW_MANIFEST"
        reject_multiline "review-force" "$DEVIMG_REVIEW_FORCE"
        case "$DEVIMG_EXPORT_FORMAT" in
          json|typescript) ;;
          *) echo "Unsupported export-format: $DEVIMG_EXPORT_FORMAT" >&2; exit 2 ;;
        esac
        case "$DEVIMG_EXPORT_TYPESCRIPT_HELPERS" in
          true|false) ;;
          *) echo "export-typescript-helpers must be true or false" >&2; exit 2 ;;
        esac
        case "$DEVIMG_REVIEW_FORCE" in
          true|false) ;;
          *) echo "review-force must be true or false" >&2; exit 2 ;;
        esac
        if [[ "$DEVIMG_EXPORT_TYPESCRIPT_HELPERS" == "true" && "$DEVIMG_EXPORT_FORMAT" != "typescript" ]]; then
          echo "export-typescript-helpers requires export-format: typescript" >&2
          exit 2
        fi
        bin="$DEVIMG_BIN"
        mode="$DEVIMG_MODE"
        config="$DEVIMG_CONFIG"
        status="pass"
        log_dir="${RUNNER_TEMP:-.}"
        mkdir -p "$log_dir"
        command_log="$log_dir/devimg-action-output.md"
        : > "$command_log"
        run_logged() {
          "$@" 2>&1 | tee -a "$command_log"
          return "${PIPESTATUS[0]}"
        }
        extract_count() {
          local label="$1"
          local file="$2"
          awk -v prefix="- ${label}: " 'index($0, prefix) == 1 { value = substr($0, length(prefix) + 1); gsub(/`/, "", value); print value }' "$file" | tail -n 1
        }
        append_summary() {
          if [[ -z "${GITHUB_STEP_SUMMARY:-}" ]]; then
            return 0
          fi
          local summary_source=""
          if [[ "$status" == "fail" && -s "$command_log" ]]; then
            summary_source="$command_log"
          elif [[ -f "$DEVIMG_REPORT_PATH" ]]; then
            summary_source="$DEVIMG_REPORT_PATH"
          elif [[ -s "$command_log" ]]; then
            summary_source="$command_log"
          fi
          {
            echo "## DevImg Action"
            echo
            echo "- Status: \`$status\`"
            echo "- Mode: \`$mode\`"
            if [[ "$mode" == "check" ]]; then
              echo "- Report path: \`$DEVIMG_REPORT_PATH\` (not written by Action check mode)"
            else
              echo "- Report path: \`$DEVIMG_REPORT_PATH\`"
            fi
            echo "- Manifest path: \`$DEVIMG_MANIFEST_PATH\`"
            if [[ -n "$DEVIMG_REVIEW_OUTPUT" ]]; then
              echo "- Review artifact: \`$DEVIMG_REVIEW_OUTPUT\`"
            fi
            if [[ -n "$summary_source" ]]; then
              generated="$(extract_count "Variants generated" "$summary_source")"
              skipped="$(extract_count "Variants skipped" "$summary_source")"
              stale="$(extract_count "Variants stale" "$summary_source")"
              if [[ -n "$generated" ]]; then
                echo "- Variants generated: \`$generated\`"
              fi
              if [[ -n "$skipped" ]]; then
                echo "- Variants skipped: \`$skipped\`"
              fi
              if [[ -n "$stale" ]]; then
                echo "- Variants stale: \`$stale\`"
              fi
            fi
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$summary_source" ]]; then
            {
              echo "## DevImg Output"
              echo
              cat "$summary_source"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        }
        if [[ "$mode" == "check" ]]; then
          args=(check --config "$config" --no-report)
          if [[ "$DEVIMG_FAIL_ON_WARNING" == "true" ]]; then
            args+=(--fail-on-warning)
          fi
        elif [[ "$mode" == "optimize" ]]; then
          args=(optimize --config "$config")
        else
          echo "Unsupported mode: $mode" >&2
          exit 2
        fi
        run_logged "$bin" "${args[@]}"
        code="$?"
        if [[ "$code" == "0" && "$mode" == "check" && -n "$DEVIMG_EXPORT_OUTPUT" ]]; then
          export_manifest="$DEVIMG_EXPORT_MANIFEST"
          if [[ -z "$export_manifest" ]]; then
            export_manifest="$DEVIMG_MANIFEST_PATH"
          fi
          export_args=(
            manifest
            export
            --manifest "$export_manifest"
            --format "$DEVIMG_EXPORT_FORMAT"
            --output "$DEVIMG_EXPORT_OUTPUT"
            --check
          )
          if [[ -n "$DEVIMG_STRIP_PREFIX" ]]; then
            export_args+=(--strip-prefix "$DEVIMG_STRIP_PREFIX")
          fi
          if [[ -n "$DEVIMG_URL_PREFIX" ]]; then
            export_args+=(--url-prefix "$DEVIMG_URL_PREFIX")
          fi
          if [[ "$DEVIMG_EXPORT_TYPESCRIPT_HELPERS" == "true" ]]; then
            export_args+=(--typescript-helpers)
          fi
          run_logged "$bin" "${export_args[@]}"
          code="$?"
        fi
        if [[ "$code" == "0" && -n "$DEVIMG_REVIEW_OUTPUT" ]]; then
          review_manifest="$DEVIMG_REVIEW_MANIFEST"
          if [[ -z "$review_manifest" ]]; then
            review_manifest="$DEVIMG_MANIFEST_PATH"
          fi
          review_args=(
            review
            --manifest "$review_manifest"
            --output "$DEVIMG_REVIEW_OUTPUT"
          )
          if [[ "$DEVIMG_REVIEW_FORCE" == "true" ]]; then
            review_args+=(--force)
          fi
          run_logged "$bin" "${review_args[@]}"
          code="$?"
        fi
        if [[ "$code" != "0" ]]; then
          status="fail"
        fi
        echo "status=$status" >> "$GITHUB_OUTPUT"
        echo "report-path=$DEVIMG_REPORT_PATH" >> "$GITHUB_OUTPUT"
        echo "manifest-path=$DEVIMG_MANIFEST_PATH" >> "$GITHUB_OUTPUT"
        echo "review-output=$DEVIMG_REVIEW_OUTPUT" >> "$GITHUB_OUTPUT"
        append_summary
        exit "$code"
