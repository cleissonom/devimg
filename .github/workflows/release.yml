name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish, such as v0.1.4
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.asset_os }}-${{ matrix.asset_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: x86_64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_os: darwin
            asset_arch: x86_64
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset_os: darwin
            asset_arch: aarch64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: x86_64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify release tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; data=json.load(sys.stdin); print(next(p["version"] for p in data["packages"] if p["name"] == "devimg"))')"
          expected="v$version"
          if [[ "$RELEASE_TAG" != "$expected" ]]; then
            echo "release tag $RELEASE_TAG does not match crate version $expected" >&2
            exit 1
          fi

      - name: Build release binary
        run: cargo build --locked --release -p devimg --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: scripts/package-release.sh "${{ matrix.target }}" "${{ matrix.asset_os }}" "${{ matrix.asset_arch }}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: devimg-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: |
            dist/devimg-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz
            dist/devimg-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify checksums
        run: |
          set -euo pipefail
          cd dist
          for checksum in *.sha256; do
            sha256sum -c "$checksum"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          ## devimg ${RELEASE_TAG}

          Release assets include the \`devimg\` CLI and SHA-256 checksums.

          Supported archives:

          - \`devimg-linux-x86_64.tar.gz\`
          - \`devimg-darwin-x86_64.tar.gz\`
          - \`devimg-darwin-aarch64.tar.gz\`
          - \`devimg-windows-x86_64.tar.gz\`
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --title "$RELEASE_TAG" --notes-file release-notes.md --verify-tag
          fi
